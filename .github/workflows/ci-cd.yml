name: CI/CD Pipeline

env:
  JAVA_VERSION: "17"
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'kienroro2003' }}
  DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY || 'be-sam-editor-backend' }}

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw -B clean test

      - name: Build package
        run: ./mvnw -B package -DskipTests

  cd:
    name: Package Artifact
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build release artifact
        run: ./mvnw -B clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: target/*.jar

  docker:
    name: Publish Docker Image
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Check Docker Hub configuration
        id: dockerhub
        run: |
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Docker publish because DOCKERHUB_TOKEN is not configured."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.dockerhub.outputs.enabled == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push Docker image
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
