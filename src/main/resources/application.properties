spring.application.name=BE-SAM-Editor

# === DATABASE ===
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sam_editor_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# === JWT ===
app.jwt.secret=${APP_JWT_SECRET:VGhpc0lzQURlbW9TZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb24xMjM0NQ==}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-days=${APP_JWT_REFRESH_EXPIRATION_DAYS:7}

# === GITHUB OAUTH2 ===
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/success}
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# === SPRING MAIL (Gmail SMTP) ===
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP expiry: 5 minutes
app.otp.expiry-minutes=${APP_OTP_EXPIRY_MINUTES:5}

# === WORKSPACE IMPORT ===
app.workspace.max-size-bytes=${APP_WORKSPACE_MAX_SIZE_BYTES:15728640}
app.workspace.file-content-max-bytes=${APP_WORKSPACE_FILE_CONTENT_MAX_BYTES:1048576}
app.workspace.blacklist-dirs=${APP_WORKSPACE_BLACKLIST_DIRS:.git,node_modules,target,dist,build,.idea,.vscode}
app.github.api-base=${APP_GITHUB_API_BASE:https://api.github.com}
app.github.token=${APP_GITHUB_TOKEN:}
app.workspace.storage-root=${APP_WORKSPACE_STORAGE_ROOT:./workspace-storage}
app.workspace.clone-timeout-seconds=${APP_WORKSPACE_CLONE_TIMEOUT_SECONDS:60}
spring.servlet.multipart.max-file-size=${APP_WORKSPACE_MAX_SIZE_BYTES:15728640}
spring.servlet.multipart.max-request-size=${APP_WORKSPACE_MAX_SIZE_BYTES:15728640}

# === CLOUDINARY (optional) ===
app.cloudinary.enabled=${APP_CLOUDINARY_ENABLED:false}
app.cloudinary.cloud-name=${APP_CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${APP_CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${APP_CLOUDINARY_API_SECRET:}
app.cloudinary.workspace-folder=${APP_CLOUDINARY_WORKSPACE_FOLDER:sam-workspaces}
app.cloudinary.private-download-url-ttl-seconds=${APP_CLOUDINARY_PRIVATE_DOWNLOAD_URL_TTL_SECONDS:300}

# === ANALYSIS COVERAGE SANDBOX ===
app.analysis.coverage.sandbox.docker-binary=${APP_ANALYSIS_COVERAGE_SANDBOX_DOCKER_BINARY:docker}
app.analysis.coverage.sandbox.docker-host=${APP_ANALYSIS_COVERAGE_SANDBOX_DOCKER_HOST:}
app.analysis.coverage.sandbox.docker-context=${APP_ANALYSIS_COVERAGE_SANDBOX_DOCKER_CONTEXT:}
app.analysis.coverage.sandbox.image=${APP_ANALYSIS_COVERAGE_SANDBOX_IMAGE:maven:3.9.9-eclipse-temurin-17}
app.analysis.coverage.sandbox.gradle-image=${APP_ANALYSIS_COVERAGE_SANDBOX_GRADLE_IMAGE:gradle:8-jdk17}
app.analysis.coverage.sandbox.network=${APP_ANALYSIS_COVERAGE_SANDBOX_NETWORK:bridge}
app.analysis.coverage.sandbox.workspace-volume=${APP_ANALYSIS_COVERAGE_SANDBOX_WORKSPACE_VOLUME:}
app.analysis.coverage.sandbox.maven-cache-volume=${APP_ANALYSIS_COVERAGE_SANDBOX_MAVEN_CACHE_VOLUME:be-sam-editor-maven-cache}
app.analysis.coverage.sandbox.gradle-cache-volume=${APP_ANALYSIS_COVERAGE_SANDBOX_GRADLE_CACHE_VOLUME:be-sam-editor-gradle-cache}
app.analysis.coverage.sandbox.prefer-related-tests=${APP_ANALYSIS_COVERAGE_SANDBOX_PREFER_RELATED_TESTS:true}
app.analysis.coverage.sandbox.timeout-seconds=${APP_ANALYSIS_COVERAGE_SANDBOX_TIMEOUT_SECONDS:300}
app.analysis.coverage.sandbox.max-output-chars=${APP_ANALYSIS_COVERAGE_SANDBOX_MAX_OUTPUT_CHARS:40000}
app.analysis.coverage.jacoco-plugin-version=${APP_ANALYSIS_COVERAGE_JACOCO_PLUGIN_VERSION:0.8.12}

# === JS COVERAGE SANDBOX ===
app.analysis.coverage.sandbox.js.image=${APP_ANALYSIS_COVERAGE_SANDBOX_JS_IMAGE:node:20-slim}
app.analysis.coverage.sandbox.js.npm-cache-volume=${APP_ANALYSIS_COVERAGE_SANDBOX_JS_NPM_CACHE_VOLUME:be-sam-editor-npm-cache}
app.analysis.coverage.sandbox.js.prefer-related-tests=${APP_ANALYSIS_COVERAGE_SANDBOX_JS_PREFER_RELATED_TESTS:true}
app.analysis.coverage.sandbox.js.timeout-seconds=${APP_ANALYSIS_COVERAGE_SANDBOX_JS_TIMEOUT_SECONDS:300}
app.analysis.coverage.sandbox.js.max-output-chars=${APP_ANALYSIS_COVERAGE_SANDBOX_JS_MAX_OUTPUT_CHARS:40000}

# === PYTHON COVERAGE SANDBOX ===
app.analysis.coverage.sandbox.python.image=${APP_ANALYSIS_COVERAGE_SANDBOX_PYTHON_IMAGE:python:3.12-slim}
app.analysis.coverage.sandbox.python.pip-cache-volume=${APP_ANALYSIS_COVERAGE_SANDBOX_PYTHON_PIP_CACHE_VOLUME:be-sam-editor-pip-cache}
app.analysis.coverage.sandbox.python.prefer-related-tests=${APP_ANALYSIS_COVERAGE_SANDBOX_PYTHON_PREFER_RELATED_TESTS:true}
app.analysis.coverage.sandbox.python.timeout-seconds=${APP_ANALYSIS_COVERAGE_SANDBOX_PYTHON_TIMEOUT_SECONDS:300}
app.analysis.coverage.sandbox.python.max-output-chars=${APP_ANALYSIS_COVERAGE_SANDBOX_PYTHON_MAX_OUTPUT_CHARS:40000}

# === AI / GROQ ===
GROQ_API_KEY=${GROQ_API_KEY:}
app.ai.groq.base-url=${APP_AI_GROQ_BASE_URL:https://api.groq.com/openai/v1}
app.ai.groq.model=${APP_AI_GROQ_MODEL:llama-3.3-70b-versatile}
